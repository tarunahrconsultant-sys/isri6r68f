<!DOCTYPE html>

    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">

    </script>

<body>
    <div class="container">
        <h2>basic progress bar</h2>
        <p>
            to create a default progress bar and a progress class to a container element and add the progress bar class to its child element use the css width property to set the width of the progress bar
        </p>
        <div class="progress">
            <div class="progress-bar" style="width: 70%;">science</div>
        </div>
        <br>
        <div class="progress">
            <div class="progress-bar" style="width: 50%;background-color: firebrick;">sst</div>
        </div>
        <br>
        <div class="progress">
        <div class="progress-bar" style="width: 40%;background-color: blue;">math</div>
        </div>
        <br>
        <div class="progress">
            <div class="progress-bar" style="width: 90%;background-color: greenyellow;">P.E</div>
    </div>
</body>
</html>
